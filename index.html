<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日記">
<title>日記</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#2c2c2a;min-height:100vh;}
#app{max-width:640px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column;}
.header{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.header h1{font-size:20px;font-weight:500;flex:1;}
.btn{background:transparent;border:0.5px solid rgba(0,0,0,0.25);border-radius:8px;padding:7px 14px;font-size:13px;color:#2c2c2a;cursor:pointer;}
.btn:hover{background:#f5f4f0;}
.btn-primary{background:#2c2c2a;color:#fff;border:none;}
.btn-primary:hover{opacity:0.85;}
.search-bar{padding:12px 16px;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.08);display:flex;gap:8px;}
.search-bar input{flex:1;font-size:14px;padding:8px 12px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#f5f4f0;color:#2c2c2a;outline:none;}
.tags-bar{padding:8px 16px;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.08);display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:12px;padding:4px 12px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.15);cursor:pointer;color:#5f5e5a;background:transparent;}
.tag.active{background:#2c2c2a;color:#fff;border-color:transparent;}
.entries{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;}
.entry-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:14px 16px;cursor:pointer;}
.entry-card:active{background:#f5f4f0;}
.entry-date{font-size:12px;color:#888780;margin-bottom:4px;}
.entry-title{font-size:15px;font-weight:500;margin-bottom:6px;}
.entry-preview{font-size:13px;color:#5f5e5a;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.entry-tags{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;}
.entry-tag{font-size:11px;padding:2px 8px;border-radius:99px;background:#f5f4f0;color:#5f5e5a;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;}
.modal-overlay.open{display:flex;align-items:flex-end;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;}
.modal-header{padding:16px 20px;border-bottom:0.5px solid rgba(0,0,0,0.1);display:flex;align-items:center;gap:8px;}
.modal-date{font-size:12px;color:#888780;margin-bottom:2px;}
.modal-header input{flex:1;font-size:16px;font-weight:500;border:none;background:transparent;color:#2c2c2a;outline:none;}
.modal-body{flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.modal-body textarea{flex:1;min-height:220px;font-size:15px;line-height:1.8;border:none;background:transparent;color:#2c2c2a;resize:none;outline:none;font-family:inherit;}
.tag-input{font-size:13px;padding:8px 12px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#f5f4f0;color:#2c2c2a;width:100%;outline:none;font-family:inherit;}
.modal-footer{padding:12px 20px;border-top:0.5px solid rgba(0,0,0,0.1);display:flex;justify-content:flex-end;gap:8px;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.btn-danger{color:#a32d2d;}
.empty{text-align:center;padding:60px 20px;color:#888780;font-size:14px;line-height:2;}
.label{font-size:12px;color:#888780;margin-bottom:4px;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>日記</h1>
    <button class="btn btn-primary" onclick="openNew()">＋ 新しい日記</button>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="キーワードで検索..." oninput="render()">
  </div>
  <div class="tags-bar" id="tagsBar"></div>
  <div class="entries" id="entries"></div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div style="flex:1">
        <div class="modal-date" id="modalDate"></div>
        <input type="text" id="modalTitle" placeholder="タイトル（省略可）">
      </div>
      <button class="btn" onclick="closeModal()">閉じる</button>
    </div>
    <div class="modal-body">
      <textarea id="modalBody" placeholder="今日はどんな一日でしたか..."></textarea>
      <div>
        <div class="label">タグ（カンマ区切り）</div>
        <input type="text" class="tag-input" id="modalTags" placeholder="例: 目標, 仕事, 日常">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteEntry()" style="display:none;">削除</button>
      <button class="btn btn-primary" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'my_diary_entries';
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let nextId = entries.length ? Math.max(...entries.map(e=>e.id)) + 1 : 1;
let editingId = null;
let activeTag = null;

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function getAllTags(){
  const s = new Set();
  entries.forEach(e => e.tags.forEach(t => s.add(t)));
  return [...s];
}

function formatDate(d){
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

function render(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const allTags = getAllTags();
  const tagsBar = document.getElementById('tagsBar');
  tagsBar.innerHTML = ['すべて',...allTags].map(t =>
    `<span class="tag${(t==='すべて'&&!activeTag)||(t===activeTag)?' active':''}" onclick="setTag('${t}')">${t}</span>`
  ).join('');

  let filtered = entries.filter(e => {
    const matchQ = !q || e.title.toLowerCase().includes(q) || e.body.toLowerCase().includes(q) || e.tags.some(t=>t.toLowerCase().includes(q));
    const matchTag = !activeTag || e.tags.includes(activeTag);
    return matchQ && matchTag;
  });

  const el = document.getElementById('entries');
  if(!filtered.length){
    el.innerHTML = '<div class="empty">まだ日記がありません<br>右上のボタンから書き始めましょう</div>';
    return;
  }
  el.innerHTML = filtered.sort((a,b)=>b.date.localeCompare(a.date)).map(e => `
    <div class="entry-card" onclick="openEdit(${e.id})">
      <div class="entry-date">${formatDate(e.date)}</div>
      ${e.title?`<div class="entry-title">${e.title}</div>`:''}
      <div class="entry-preview">${e.body}</div>
      ${e.tags.length?`<div class="entry-tags">${e.tags.map(t=>`<span class="entry-tag">${t}</span>`).join('')}</div>`:''}
    </div>
  `).join('');
}

function setTag(t){
  activeTag = t==='すべて' ? null : t;
  render();
}

function openNew(){
  editingId = null;
  document.getElementById('modalTitle').value = '';
  document.getElementById('modalBody').value = '';
  document.getElementById('modalTags').value = '';
  document.getElementById('modalDate').textContent = formatDate(new Date().toISOString().slice(0,10));
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modalBody').focus(), 100);
}

function openEdit(id){
  const e = entries.find(e=>e.id===id);
  editingId = id;
  document.getElementById('modalTitle').value = e.title;
  document.getElementById('modalBody').value = e.body;
  document.getElementById('modalTags').value = e.tags.join(', ');
  document.getElementById('modalDate').textContent = formatDate(e.date);
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

function handleOverlayClick(e){
  if(e.target === document.getElementById('modal')) closeModal();
}

function saveEntry(){
  const title = document.getElementById('modalTitle').value.trim();
  const body = document.getElementById('modalBody').value.trim();
  const tags = document.getElementById('modalTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!body){ alert('内容を入力してください'); return; }
  if(editingId){
    const e = entries.find(e=>e.id===editingId);
    e.title = title; e.body = body; e.tags = tags;
  } else {
    entries.push({id:nextId++, date:new Date().toISOString().slice(0,10), title, body, tags});
  }
  save();
  closeModal();
  render();
}

function deleteEntry(){
  if(!editingId) return;
  if(!confirm('この日記を削除しますか？')) return;
  entries = entries.filter(e=>e.id!==editingId);
  save();
  closeModal();
  render();
}

render();
</script>
</body>
</html>
